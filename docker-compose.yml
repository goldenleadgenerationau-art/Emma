version: '3.9'

services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - '8080:8080'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
